  /discovery/menu/{business}:
    get: { tags: [Discovery], summary: A business's menu grouped by sections (public), security: [], parameters: [{ name: business, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }
  /discovery/retail/filters:
    get: { tags: [Discovery], summary: Retail filters (public), security: [], responses: { '200': { description: OK } } }
  /discovery/retail/products:
