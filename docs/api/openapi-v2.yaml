  /discovery/retail/products/{product}:
    get: { tags: [Discovery], summary: Retail product + its offers (public), security: [], parameters: [{ name: product, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }

  # ─────────────────────── Offers (Discovery) ───────────────────────
  /offers:
    get: { tags: [Offers (Discovery)], summary: Browse offers (public), security: [], responses: { '200': { description: OK } } }
  /offers/lowest:
    get: { tags: [Offers (Discovery)], summary: Lowest offer for an offerable (public), security: [], responses: { '200': { description: OK } } }
  /offers/business/{business}:
    get: { tags: [Offers (Discovery)], summary: A business's offers (public), security: [], parameters: [{ name: business, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }
  /offers/{offer}:
    get: { tags: [Offers (Discovery)], summary: Offer detail (public), security: [], parameters: [{ name: offer, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }
  /offers/{offer}/track:
    post: { tags: [Offers (Discovery)], summary: Track an offer view/click (public), security: [], parameters: [{ name: offer, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }
  /offers/compare:
    get: { tags: [Offers (Discovery)], summary: Compare offers (authed), responses: { '200': { description: OK } } }

  # ─────────────────────────── Search ───────────────────────────
  /search/offers:
    get: { tags: [Search], summary: Search offers (public), security: [], responses: { '200': { description: OK } } }
  /search/business/{business}/offers:
    get: { tags: [Search], summary: Search a business's offers (public), security: [], parameters: [{ name: business, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }

  # ─────────────────────────── Jobs ───────────────────────────
  /jobs:
    get: { tags: [Jobs], summary: Browse open jobs — filterable by category_id/category_child_id (public), security: [], responses: { '200': { description: OK } } }
    post:
      tags: [Jobs]
      summary: A business posts a vacancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, title, body]
              properties:
                category_id: { type: integer }
                category_child_id: { type: integer, description: Must belong to category_id. }
                title: { type: string, maxLength: 191, description: 'The job title, in whichever language the business writes it.' }
                body: { type: string, description: The job description. }
                requirements: { type: string }
                salary: { type: string, description: 'Free text on purpose — often "يحدد بعد المقابلة", not a number.' }
                interview_starts_at: { type: string, format: date-time }
                expire_at: { type: string, format: date-time, description: When the ad itself closes. }
      responses:
        '201': { description: Created }
        '403': { description: Not a business account }
        '422': { $ref: '#/components/responses/Validation' }
  /jobs/categories:
    get: { tags: [Jobs], summary: Category/specialty tree — only branches with an open job, with a count each (public), security: [], responses: { '200': { description: OK } } }
  /deposits:
    get:
      tags: [Deposits]
      summary: Escrow deposits this account is a party to
      description: 'No filter can widen the scope beyond the caller.'
      parameters:
        - { in: query, name: status, schema: { type: string, enum: [frozen, in_progress, released, refunded, split] } }
        - { in: query, name: role, schema: { type: string, enum: [client, business] } }
        - { in: query, name: per_page, schema: { type: integer, maximum: 50 } }
      responses:
        '200': { description: OK }
  /deposits/{deposit}:
    get:
      tags: [Deposits]
      summary: One deposit, if you are a party to it
      description: '404 rather than 403 for a non-party, so ids cannot be probed.'
      parameters:
        - { in: path, name: deposit, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
  /disputes/reason-codes:
    get:
      tags: [Disputes]
      summary: The reason codes a dispute may be opened with
      description: 'A controlled vocabulary, so the app can show a localized picker and cases can be grouped by what went wrong.'
      responses:
        '200': { description: OK }
  /disputes:
    get:
      tags: [Disputes]
      summary: Disputes this account is a party to
      description: 'No filter can widen the scope beyond the caller.'
      parameters:
        - { in: query, name: status, schema: { type: string, enum: [open, mutual_resolution, under_review, resolved, closed, cancelled, expired] } }
        - { in: query, name: role, schema: { type: string, enum: [opener, respondent] } }
        - { in: query, name: per_page, schema: { type: integer, maximum: 50 } }
      responses:
        '200': { description: OK }
  /disputes/{dispute}:
    get:
      tags: [Disputes]
      summary: One dispute, if you are a party to it
      description: 'Internal meta and the admin resolution notes are never returned; a split ruling exposes only its percentages.'
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
  /bookings/{booking}/disputes:
    post:
      tags: [Disputes]
      summary: Open a dispute on a booking
      description: >-
        Only the booking's client or business may open one; anyone else gets 404 so
        ids cannot be probed. Returns 200 rather than 201 because an already-open
        dispute over the same booking is returned instead of a second one being
        created. Ruling is admin-only and deliberately absent here.
      parameters:
        - { in: path, name: booking, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason_code]
              properties:
                reason_code: { type: string, enum: [not_delivered, not_as_described, quality, late, cancelled_by_business, no_show, overcharged, damage, other] }
                reason_text: { type: string, maxLength: 2000 }
      responses:
        '200': { description: 'Opened, or the existing live dispute' }
        '404': { description: 'Not found, or you are not a party to the booking' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/cooperate:
    post:
      tags: [Disputes]
      summary: Declare that you are engaging with the settlement
      description: >-
        Idempotent — the timestamp records when you FIRST showed up and is not
        moved by declaring again. Its absence is what matters: when the
        settlement window expires, whoever never declared is flagged for the
        arbitrator to weigh. The flag is a mark, never an automatic charge.
        Responds with `my_side` (client|business), read from the booking rather
        than from who opened the case.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/closure-confirmation:
    post:
      tags: [Disputes]
      summary: Agree to delete a finished dispute's conversation
      description: >-
        Only on a CLOSED dispute, and only with BOTH parties confirming: the
        first tap is a request the other side is shown, the second erases the
        conversation for good. The dispute number, both parties and the ruling
        are kept — only the messages, seats and conduct violations go. A purged
        room's GET returns `meta.thread.purged: true` and is never rebuilt.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/settlement:
    post:
      tags: [Disputes]
      summary: Mark the dispute as settled between the parties
      description: >-
        Takes effect only when BOTH sides have pressed it — an agreement one
        party declares alone is not an agreement. The first tap is a proposal
        the other party is notified about and asked to confirm; the second
        resolves the dispute as `mutual_settlement` and unwinds the escrow, each
        hold returning to whoever posted it. Allowed right up to a ruling,
        including once an arbitrator is involved: an agreement the parties
        reached themselves beats a decision imposed on them. Idempotent.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
    delete:
      tags: [Disputes]
      summary: Withdraw your agreement
      description: >-
        Open until the second tap lands, so a mis-tap does not become a
        settlement the moment the other side agrees. Refused once the dispute
        has been resolved.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/settlement-payments:
    get:
      tags: [Disputes]
      summary: The off-app settlement proposals on this dispute
      description: >-
        `current` is the one on the table (proposed or accepted); `history` keeps
        every figure including the refused ones, because the haggling is part of
        what an arbitrator needs to read.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
    post:
      tags: [Disputes]
      summary: Propose an amount settled outside the platform
      description: >-
        The platform never touches this money and cannot verify a transfer, so
        it records the statements about it instead. Only one proposal may be
        live at a time — accept or reject the current one first.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payer_side, amount]
              properties:
                payer_side: { type: string, enum: [client, business], description: 'Who hands over the money; the other side is the payee.' }
                amount: { type: number, minimum: 0.01 }
                method: { type: string, maxLength: 40 }
                note: { type: string, maxLength: 2000 }
      responses:
        '201': { description: Created }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/settlement-payments/{settlement}:
    delete:
      tags: [Disputes]
      summary: Withdraw your own proposal
      description: 'Only the proposer, and only while it is still unaccepted.'
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
        - { in: path, name: settlement, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or not part of this dispute' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/settlement-payments/{settlement}/accept:
    post:
      tags: [Disputes]
      summary: Accept the proposed amount
      description: 'The OTHER side only — the proposer already agreed by proposing.'
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
        - { in: path, name: settlement, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or not part of this dispute' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/settlement-payments/{settlement}/reject:
    post:
      tags: [Disputes]
      summary: Reject the proposed amount
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
        - { in: path, name: settlement, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or not part of this dispute' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/settlement-payments/{settlement}/received:
    post:
      tags: [Disputes]
      summary: Confirm the money actually arrived
      description: >-
        The PAYEE only — a payer confirming their own payment proves nothing.
        This is the statement that closes the dispute: it resolves as
        `mutual_settlement` and the escrow unwinds, each hold returning to
        whoever posted it. The off-app amount itself never touches a wallet.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
        - { in: path, name: settlement, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Received; the dispute is now resolved' }
        '404': { description: 'Not found, or not part of this dispute' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/request-arbitration:
    post:
      tags: [Disputes]
      summary: Ask for an arbitrator without waiting out the settlement window
      description: >-
        ONE party is enough — requiring both to agree would let a stonewaller
        block arbitration forever, which is the exact situation it exists for.
        The asker must hold the session fee in their wallet (see
        `arbitration.fee` on GET /disputes/{dispute}); the RESPONDENT's balance
        is deliberately not checked, or emptying a wallet would block every
        request. Escalation by deadline is never gated on any balance.
        The asker must have declared cooperation first: you have to show up
        before you can demand a judge, and that also stops a dispute being
        opened and escalated in the same breath. Unlike expiry, this does NOT
        flag the other party as uncooperative — the window is still open.
        Idempotent once the dispute is already under review.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Now under review' }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/room:
    get:
      tags: [Disputes]
      summary: The conversation on this dispute
      description: >-
        Opens with the dispute, so the settlement window has somewhere to happen.
        An arbitrator takes a third seat in the same thread once the window
        expires. Reading it marks it read. `meta.thread` carries the status, the
        lock and the seat list.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
        - { in: query, name: per_page, schema: { type: integer, maximum: 100 } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
  /disputes/{dispute}/room/conduct:
    get:
      tags: [Disputes]
      summary: The conduct rules, and whether you have accepted them
      description: >-
        Must be shown and explicitly accepted before the composer is opened.
        What a party consents to is that the arbitrator may rule against them,
        and fine them, for HOW they behave here — separately from who is right
        about the booking. `version` is stored with the acceptance: a rewritten
        charter is a different promise, so bumping it invalidates earlier
        agreements.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
    post:
      tags: [Disputes]
      summary: Accept the conduct rules
      description: >-
        Required before posting; the room refuses messages from a party who has
        not accepted the current version. Arbitrators are exempt — the clauses
        are about losing the case and being fined, neither of which can happen
        to the person deciding it.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
    delete:
      tags: [Disputes]
      summary: Refuse the terms
      description: >-
        Recorded rather than inferred from silence — refusing and not having
        opened the app are different facts. The consequence is forfeiting the
        right to argue: the room closes to you and the arbitrator rules on the
        evidence before them. It is NOT an automatic loss. Accepting later
        reverses it.
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }
  /disputes/{dispute}/room/messages:
    post:
      tags: [Disputes]
      summary: Post a message into the dispute's room
      description: 'Refused once a ruling has sealed the room — the record is evidence.'
      parameters:
        - { in: path, name: dispute, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 5000 }
      responses:
        '201': { description: Created }
        '404': { description: 'Not found, or you are not a party to it' }
        '422': { $ref: '#/components/responses/Validation' }

  # ──────────────────── Fines (fraud/abuse) ────────────────────
  /fines:
    get:
      tags: [Fines]
      summary: My platform fines
      description: The fines levied on you, newest first. Paginated.
      responses:
        '200': { description: OK }
  /fines/{fine}:
    get:
      tags: [Fines]
      summary: One of my fines
      parameters:
        - { in: path, name: fine, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or not yours' }
  /fines/{fine}/appeal:
    post:
      tags: [Fines]
      summary: Contest a fine while its window is open
      description: >-
        Allowed only on your own fine, only while it is appealable and the
        window has not closed. Filing pauses collection until an admin decides.
      parameters:
        - { in: path, name: fine, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [statement]
              properties:
                statement: { type: string, maxLength: 2000 }
      responses:
        '200': { description: 'Appeal submitted' }
        '404': { description: 'Not found, or not yours' }
        '422': { $ref: '#/components/responses/Validation' }

  /posts:
    get:
      tags: [Posts]
      summary: 'The feed — public, and audience-scoped when a bearer token is sent'
      security: []
      parameters:
        - { in: query, name: latitude, schema: { type: number }, description: 'With longitude, orders nearest-first (computed in SQL).' }
        - { in: query, name: longitude, schema: { type: number } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: per_page, schema: { type: integer, maximum: 50 } }
      responses:
        '200': { description: OK }
    post:
      tags: [Posts]
      summary: Publish a post
      description: 'multipart/form-data when images are attached.'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [body]
              properties:
                title: { type: string, maxLength: 191, description: 'The post title, in whichever language the author writes it. Required unless subject_type is sent, in which case the linked item names the post.' }
                body: { type: string }
                expire_at: { type: string, format: date-time }
                subject_type:
                  type: string
                  enum: [menu_item, bookable_item]
                  description: >
                    Optionally link the post to something the caller sells, so the
                    reader can act on it. Must be sent together with subject_id, and
                    the item must belong to the caller — otherwise 422. This is a
                    reference only: price, discount and audience live on
                    commercial_offers, not here.
                subject_id: { type: integer, minimum: 1 }
                image: { type: string, format: binary, description: Main image. }
                images:
                  type: array
                  maxItems: 10
                  items: { type: string, format: binary }
      responses:
        '201': { description: Created }
        '422': { $ref: '#/components/responses/Validation' }
  /posts/{post}/comments:
    get:
      tags: [Posts]
      summary: 'Top-level comments, filtered to what the reader may see'
      description: >
        Public reading. The post's author sees every comment; any other
        signed-in reader sees public comments plus their own private ones; a
        guest sees public only. Applied as a query scope, so paging stays
        correct.
      security: []
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
        - { in: query, name: per_page, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or it is a job posting' }
    post:
      tags: [Posts]
      summary: Add a comment
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, maxLength: 5000 }
                status:
                  type: string
                  enum: [public, private]
                  default: public
                  description: 'private = visible only to you and the post owner.'
      responses:
        '201': { description: Created }
        '422': { $ref: '#/components/responses/Validation' }
  /comments/{comment}/replies:
    get:
      tags: [Posts]
      summary: Replies to a comment
      description: 'Returns 404 when the parent comment itself is not readable by you.'
      security: []
      parameters:
        - { in: path, name: comment, required: true, schema: { type: integer } }
        - { in: query, name: per_page, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or the parent is private and not yours' }
    post:
      tags: [Posts]
      summary: Reply to a comment
      description: >
        A reply can never be more visible than its parent — replying to a
        private comment always produces a private reply, whatever status is
        requested, or the private thread would leak.
      parameters:
        - { in: path, name: comment, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, maxLength: 5000 }
                status: { type: string, enum: [public, private] }
      responses:
        '201': { description: Created }
        '404': { description: Parent not readable }
  /comments/{comment}:
    put:
      tags: [Posts]
      summary: Edit your own comment
      parameters:
        - { in: path, name: comment, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, maxLength: 5000 }
      responses:
        '200': { description: OK }
        '403': { description: 'Not your comment — the post owner moderates, but does not rewrite' }
    patch:
      tags: [Posts]
      summary: Edit your own comment
      parameters:
        - { in: path, name: comment, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '403': { description: Not your comment }
    delete:
      tags: [Posts]
      summary: Delete a comment (its author, or the post's author moderating)
      description: 'Deleting a comment deletes its replies — they would otherwise be orphaned and unreachable.'
      parameters:
        - { in: path, name: comment, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '403': { description: Neither the comment author nor the post owner }
  /posts/mine:
    get:
      tags: [Posts]
      summary: My own posts, active or not
      responses:
        '200': { description: OK }
  /posts/subject-options:
    get:
      tags: [Posts]
      summary: What this account can link a post to
      description: >
        The pickable subjects, derived from what the caller actually owns
        (menu items grouped by section, bookable units) rather than from a
        service subscription. An empty list is a normal answer: a business with
        no menu and no bookable units has nothing to advertise but free text.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      options:
                        type: array
                        items:
                          type: object
                          properties:
                            type: { type: string, enum: [menu_item, bookable_item] }
                            label: { type: string }
                            groups:
                              type: array
                              items:
                                type: object
                                properties:
                                  id: { type: integer, nullable: true }
                                  label: { type: string }
                                  items:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        id: { type: integer }
                                        name: { type: string }
                                        price: { type: number, nullable: true }
  /posts/{post}:
    get:
      tags: [Posts]
      summary: One post
      security: []
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '404': { description: 'Not found, or it is a job posting' }
    post:
      tags: [Posts]
      summary: Edit own post
      description: >
        POST rather than PUT because PHP does not parse multipart bodies on
        PUT. Uploading images APPENDS to the gallery; pass replace_images=true
        to wipe it first (v1 wiped it on every update that carried an image).
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title: { type: string, maxLength: 191 }
                body: { type: string }
                expire_at: { type: string, format: date-time }
                is_active: { type: boolean }
                subject_type:
                  type: string
                  nullable: true
                  enum: [menu_item, bookable_item]
                  description: >
                    Omit to leave the existing link untouched; send null (or empty)
                    to unlink; send it with subject_id to relink.
                subject_id: { type: integer, minimum: 1 }
                replace_images: { type: boolean }
                image: { type: string, format: binary }
                images:
                  type: array
                  maxItems: 10
                  items: { type: string, format: binary }
      responses:
        '200': { description: OK }
        '403': { description: Not your post }
    delete:
      tags: [Posts]
      summary: Delete own post and its stored files
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '403': { description: Not your post }
  /posts/{post}/share:
    post:
      tags: [Posts]
      summary: Count a share
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
  /posts/{post}/react:
    post:
      tags: [Posts]
      summary: 'Like (1), dislike (-1) or clear (0)'
      parameters:
        - { in: path, name: post, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reaction]
              properties:
                reaction: { type: integer, enum: [-1, 0, 1] }
      responses:
        '200': { description: OK }
        '422': { $ref: '#/components/responses/Validation' }
  /jobs/stats:
    get:
      tags: [Jobs]
      summary: 'Platform-wide job counters (public) — the aggregate companion to /jobs/mine/stats'
      description: >
        Aggregates only: jobs_posted, jobs_open, applicants_total,
        approved_total, businesses_hiring. Names nobody, so the rule that only
        the posting business sees applicant identities still holds.
      security: []
      responses:
        '200': { description: OK }
  /jobs/mine/stats:
    get: { tags: [Jobs], summary: The signed-in business's counters — jobs_posted, jobs_open, applicants_total, approved_total, responses: { '200': { description: OK }, '403': { description: Not a business account } } }
  /jobs/follows:
    get: { tags: [Jobs], summary: My followed job fields, responses: { '200': { description: OK } } }
    post:
      tags: [Jobs]
      summary: Follow a job field (a whole category or one specialty) for live push
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id: { type: integer, description: Follow a whole root category. }
                category_child_id: { type: integer, description: Follow one specialty. At least one of the two is required. }
      responses:
        '201': { description: Created }
        '422': { $ref: '#/components/responses/Validation' }
  /jobs/follows/{follow}:
    delete: { tags: [Jobs], summary: Unfollow a job field, parameters: [{ name: follow, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } } }
  /jobs/{post}:
    get: { tags: [Jobs], summary: Job detail — includes applicants_count, never applicant identities (public), security: [], parameters: [{ name: post, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK } } }
  /jobs/{post}/apply:
    post: { tags: [Jobs], summary: A client applies (once — a repeat is 422), parameters: [{ name: post, in: path, required: true, schema: { type: integer } }], responses: { '201': { description: Created }, '422': { $ref: '#/components/responses/Validation' } } }
  /jobs/{post}/close:
    post: { tags: [Jobs], summary: The posting business stops accepting applications, parameters: [{ name: post, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK }, '403': { description: Not the posting business } } }
  /jobs/{post}/applicants:
    get: { tags: [Jobs], summary: Full applicant list — the posting business only, parameters: [{ name: post, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK }, '403': { description: Not the posting business } } }
  /jobs/{post}/applicants/{apply}/approve:
    post: { tags: [Jobs], summary: The posting business accepts an applicant (idempotent, notifies them), parameters: [{ name: post, in: path, required: true, schema: { type: integer } }, { name: apply, in: path, required: true, schema: { type: integer } }], responses: { '200': { description: OK }, '403': { description: Not the posting business }, '404': { $ref: '#/components/responses/NotFound' } } }
